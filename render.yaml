services:
  - type: web
    name: medislot-ai-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false        # Set this in Render dashboard (your MongoDB Atlas URI)
      - key: JWT_SECRET
        sync: false        # Set this in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false        # Set to your Vercel frontend URL e.g. https://medislot-ai.vercel.app
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
